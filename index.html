<!doctype html>
<html lang="nl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fallback title/description (overridden by react-helmet-async after JS loads) -->
    <title>Vexxo Studio — Strakke code. Scherp design. Echte resultaten.</title>
    <meta name="description" content="Freelance webdesign & development studio gevestigd in België. Premium websites voor kleine en middelgrote bedrijven." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7C3AED" />
    <link rel="icon" href="/VexxoLogoEmblem.svg" type="image/svg+xml" />

    <!-- Font preconnect (must come before stylesheet links) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Google Fonts (link tags, not @import — avoids render-blocking CSS) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
