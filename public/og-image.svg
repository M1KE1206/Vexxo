<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0e13"/>
  <!-- Subtle glow blobs -->
  <ellipse cx="200" cy="150" rx="260" ry="200" fill="#7C3AED" opacity="0.07"/>
  <ellipse cx="1000" cy="500" rx="220" ry="180" fill="#F97316" opacity="0.05"/>
  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.4"/>
  <!-- Logo text -->
  <text x="600" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2">Vexxo Studio</text>
  <!-- Tagline -->
  <text x="600" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400" fill="#f9f5fd" text-anchor="middle" opacity="0.85">Clean Code. Sharp Design. Real Results.</text>
  <!-- Gradient line accent -->
  <rect x="520" y="380" width="160" height="3" rx="1.5" fill="url(#grad)"/>
  <!-- URL -->
  <text x="600" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#acaab1" text-anchor="middle">vexxo.studio</text>
</svg>
